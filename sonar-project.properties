sonar.projectKey=tcprescott_sahasrahbot

# Exclude vendored third-party assets and build artifacts from analysis.
# These (tinymce, lobibox, ckeditor, etc.) account for ~3000 phantom issues and
# ~7000 "duplicate" lines that drown out real signal. Keep spa/src analyzed.
sonar.exclusions=alttprbot/presentation/api/static/theme-assets/**,\
  alttprbot/presentation/api/spa/dist/**,\
  alttprbot/presentation/api/spa/build/**,\
  alttprbot/presentation/api/spa/node_modules/**,\
  migrations/**
