name: lint

on:
  push:
    branches: [master]
  pull_request:

jobs:
  architecture-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --with dev
      # Architecture boundaries (import-linter). Blocking: all contracts are green,
      # so any new boundary violation fails the build.
      - name: Check import boundaries
        run: poetry run lint-imports
      - name: Run tests
        run: poetry run pytest -q --cov --cov-report=term-missing
